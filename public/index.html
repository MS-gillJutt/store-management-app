
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Smart Inventory</h2>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="#" class="active"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
                    <li><a href="#"><i class="fas fa-boxes"></i><span>Inventory</span></a></li>
                    <li><a href="#"><i class="fas fa-shopping-cart"></i><span>Orders</span></a></li>
                    <li><a href="#"><i class="fas fa-users"></i><span>Customers</span></a></li>
                    <li><a href="#"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
                    <li><a href="#"><i class="fas fa-cog"></i><span>Settings</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-toggle">
                <button id="toggle-btn"><i class="fas fa-chevron-left"></i></button>
            </div>
        </aside>
        <main class="main-content">
            <header class="header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search for items...">
                </div>
                <div class="header-user" id="user-dashboard">
                    <p>Welcome, <span id="user-name">Guest</span></p>
                </div>
            </header>
            <section class="dashboard-metrics">
                <div class="metric-card">
                    <h3>TOTAL ITEMS</h3>
                    <p id="total-items">1,250</p>
                </div>
                <div class="metric-card">
                    <h3>LOW STOCK</h3>
                    <p id="low-stock-items">15</p>
                </div>
                <div class="metric-card">
                    <h3>TODAY'S SALES</h3>
                    <p id="todays-sales">$1,500</p>
                </div>
                <div class="metric-card">
                    <h3>NEW ORDERS</h3>
                    <p id="new-orders">3</p>
                </div>
            </section>
            <div class="quick-actions">
                <button id="new-order-btn">New Order</button>
                <button id="add-item-btn">Add New Item</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
