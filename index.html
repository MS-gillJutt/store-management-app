<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Inventory Dashboard</h1>
            <p>Your Modern Store</p>
        </header>
        
        <main>
            <!-- Filters and Search -->
            <div class="controls-container">
                <div id="category-filters">
                    <!-- Category buttons will be inserted here by JavaScript -->
                </div>
                <div class="search-container">
                    <input type="text" id="search-bar" placeholder="Search for items...">
                </div>
            </div>

            <!-- Items Grid -->
            <div id="items-grid-container">
                <!-- Item cards will be inserted here by JavaScript -->
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
