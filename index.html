
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory</title>
    <link rel="stylesheet" href="style.css">
    <!-- SUPABASE SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- ... rest of your HTML ... -->
        <header>
            <h1>Smart Inventory</h1>
            <p>Your Store Name</p>
        </header>
        
        <main>
            <!-- Sales/Order Section -->
            <section id="sales-section">
                <div class="search-container">
                    <input type="text" id="search-bar" placeholder="Search for items to add to order...">
                </div>
                
                <div class="order-list-container">
                    <h2>Current Order</h2>
                    <ul id="order-list">
                        <!-- Order items will be added here -->
                    </ul>
                    <div id="order-total"></div>
                    <button id="generate-bill-btn">Generate Bill</button>
                </div>
            </section>

            <!-- Inventory Section -->
            <section id="inventory-section">
                <h2>Inventory</h2>
                <button id="add-item-btn">Add New Item</button>
                <ul id="inventory-list">
                    <!-- Inventory items will be displayed here -->
                </ul>
            </section>
        </main>

        <!-- Add Item Modal -->
        <div id="add-item-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Add New Item</h2>
                <form id="add-item-form">
                    <input type="text" id="item-name" placeholder="Item Name" required>
                    <input type="number" id="item-price" placeholder="Item Price" required>
                    <button type="submit">Save Item</button>
                </form>
            </div>
        </div>

        <!-- Bill Modal -->
        <div id="bill-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Invoice / Bill</h2>
                <div id="bill-content">
                    <!-- Bill details will be injected here -->
                </div>
                <button id="print-bill-btn">Print Bill</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
