
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Smart Inventory</h2>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="#" class="active">Dashboard</a></li>
                    <li><a href="#">Inventory</a></li>
                    <li><a href="#">Orders</a></li>
                    <li><a href="#">Customers</a></li>
                    <li><a href="#">Reports</a></li>
                    <li><a href="#">Settings</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header class="header">
                <div class="header-search">
                    <input type="text" placeholder="Search for items...">
                </div>
                <div class="header-user" id="user-dashboard">
                    <p>Welcome, <span id="user-name">Guest</span></p>
                </div>
            </header>
            <section class="dashboard-metrics">
                <div class="metric-card">
                    <h3>TOTAL ITEMS</h3>
                    <p id="total-items">1,250</p>
                </div>
                <div class="metric-card">
                    <h3>LOW STOCK</h3>
                    <p id="low-stock-items">15</p>
                </div>
                <div class="metric-card">
                    <h3>TODAY'S SALES</h3>
                    <p id="todays-sales">$1,500</p>
                </div>
                <div class="metric-card">
                    <h3>NEW ORDERS</h3>
                    <p id="new-orders">3</p>
                </div>
            </section>
            <div class="quick-actions">
                <button id="new-order-btn">New Order</button>
                <button id="add-item-btn">Add New Item</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
